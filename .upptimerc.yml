# Core Configuration
owner: hirempire
repo: status

# Monitoring Targets
sites:
  - name: Database
    url: https://data.hirempire.com/health
  - name: API
    url: https://api.hirempire.com

# Status Website Customization
status-website:
  # Using your custom domain
  cname: status.hirempire.com
  
  # BaseURL is ignored when using a CNAME, but kept for fallback
  baseUrl: ""
  head: >
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap');
      body, html, * { font-family: 'Manrope', sans-serif !important; }
    </style>
  
  logoUrl: https://assets-hirempire.s3.us-east-1.amazonaws.com/hirempire-logo-blue.svg
  favicon: https://assets-hirempire.s3.us-east-1.amazonaws.com/hirempire-icon.svg
  name: Hirempire Status
  introTitle: "**Hirempire** Service Status"
  introMessage: Real-time monitoring of our core infrastructure and services.
  
  # Theme Settings
  theme: 
    primaryColor: "#3349c0"
    accentColor: "#3349c0"
    backgroundColor: "#ffffff"
    textColor: "#333333"
    fontFamily: "'Manrope', system-ui, -apple-system, sans-serif"

  # Navigation Menu
  navbar:
    - title: Status
      href: /
    - title: Main Site
      href: https://hirempire.com

