# Core Configuration
owner: hirempire
repo: status

# Monitoring Targets
sites:
  - name: Database
    url: https://data.hirempire.com/health
  - name: API
    url: https://api.hirempire.com

# Status Website Customization
status-website:
  # Using your custom domain
  cname: status.hirempire.com
  
  # BaseURL is ignored when using a CNAME, but kept for fallback
  baseUrl: /
  
  logoUrl: https://assets-hirempire.s3.us-east-1.amazonaws.com/hirempire-logo-blue.svg
  name: Hirempire Status
  introTitle: "**Hirempire** Service Status"
  introMessage: Real-time monitoring of our core infrastructure and services.
  
  # Theme Settings
  theme: 
    primaryColor: "#3349c0"
    accentColor: "#3349c0"
    backgroundColor: "#ffffff"
    textColor: "#333333"

  # Navigation Menu
  navbar:
    - title: Status
      href: /
    - title: Main Site
      href: https://hirempire.com
    - title: Support
      href: mailto:support@hirempire.com
    - title: GitHub
      href: https://github.com/hirempire/status
